############################################################
# redis.conf — Twitch Rank Indexer (Phase 4)
# Tuned for: high-concurrency async, small GET/SET, repeated
# reads, medium write volume, no pub/sub, no sorted sets.
############################################################


############################################################
# PERSISTENCE
# ── AOF only — RDB disabled.
# ── Your pipeline re-fetches everything from the API if
#    Redis is wiped; persistence here is only for
#    fast warm re-runs.  AOF everysec is the right balance:
#    at most 1 second of data loss, no blocking writes.
############################################################

appendonly yes
appendfsync everysec

# Don't stall fsync during AOF rewrite (avoids latency spikes
# under your write bursts)
no-appendfsync-on-rewrite yes

# Disable RDB snapshots entirely — AOF is sufficient and
# RDB bgsave competes for I/O with your write bursts.
save ""

# Compress AOF rewrites
aof-use-rdb-preamble yes


############################################################
# MEMORY
# ── 512 MB ceiling.  Your data:
#    • ~4,800 page keys  × ~2 KB each  = ~9 MB
#    • ~48 rankmap hashes × ~60 KB each = ~3 MB
#    Total active footprint: ~12 MB  (well within limit)
#
# ── allkeys-lru: evict the least-recently-used keys when
#    maxmemory is hit.  Correct for a cache workload — you
#    never need to protect specific keys from eviction.
############################################################

maxmemory 512mb
maxmemory-policy allkeys-lru

# Non-blocking eviction and expiry — critical for your
# workload because your async workers can't afford to block
# while Redis frees memory synchronously.
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# How aggressively to sample for LRU eviction.
# 10 = better accuracy than default 5; negligible CPU cost
# at your data volume.
maxmemory-samples 10


############################################################
# PERFORMANCE — I/O THREADS
# ── io-threads 4: matches your async concurrency (15 workers)
#    and a typical 4-core VM.  Enables parallel network I/O
#    for GET/SET bursts.
# ── io-threads-do-reads yes: also thread the read path,
#    which is your dominant operation (cache hits).
#
# ⚠ If running on a 2-core machine, set io-threads 2.
# ⚠ io-threads > 1 only helps when you have many simultaneous
#   connections — which you do (concurrency=15 + headroom).
############################################################

io-threads 4
io-threads-do-reads yes


############################################################
# PERFORMANCE — NETWORK
############################################################

# Large backlog for burst connection acceptance
tcp-backlog 1024

# Never close idle connections (your async session holds
# a persistent pool — keep it alive)
timeout 0

# Send TCP keepalives every 300 s to detect dead connections
# before they accumulate
tcp-keepalive 300


############################################################
# PERFORMANCE — GENERAL
############################################################

# Hash encoding: use ziplist (compact) until a hash has more
# than 256 fields.  Your rankmap hashes have up to 2,429
# fields — switch threshold to listpack for memory savings.
hash-max-listpack-entries 256
hash-max-listpack-value 64

# Disable slow-log for entries faster than 10 ms
# (avoids overhead on your fast small commands)
slowlog-log-slower-than 10000
slowlog-max-len 128


############################################################
# NETWORK — BINDING
############################################################

bind 0.0.0.0
protected-mode no
port 6379


############################################################
# LOGGING
############################################################

loglevel notice
logfile ""


############################################################
# DATA DIR  (matches Docker volume mount)
############################################################

dir /data
